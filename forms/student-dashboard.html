<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生解題首頁 — 安圖教育</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .dashboard-container {
            max-width: 800px;
            margin: 100px auto;
            padding: 0 1rem;
        }

        .credit-box {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .credit-box h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .credit-balance {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .upload-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
        }

        .form-section {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .form-section-title {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            color: var(--text);
        }

        .upload-box {
            border: 2px dashed var(--border);
            border-radius: var(--radius-md);
            padding: 3rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .upload-box:hover {
            border-color: var(--primary);
        }

        .dynamic-pricing-alert {
            background: rgba(43, 87, 151, 0.1);
            border-left: 4px solid var(--primary);
            padding: 1rem;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            margin: 1.5rem 0;
        }

        .cost-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg);
            padding: 1.5rem;
            border-radius: var(--radius-md);
            margin-top: 2rem;
        }

        .cost-amount {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
    </style>
</head>

<body>

    <header>
        <nav class="nav" role="navigation">
            <div class="nav__inner">
                <a href="../home.html" class="nav__logo">
                    安圖<span>教育</span>
                </a>
            </div>
        </nav>
    </header>

    <main class="dashboard-container">

        <!-- Header / Credits -->
        <div class="credit-box">
            <div>
                <h2>我的解題帳號</h2>
                <p style="color: var(--text-light); margin-top: 0.5rem;">李同學 (NTU 附中)</p>
            </div>
            <div style="text-align: right;">
                <div class="credit-balance">12 點</div>
                <a href="../solve.html#pricing"
                    style="color: var(--primary); font-size: 0.875rem; text-decoration: underline;">儲值點數</a>
            </div>
        </div>

        <!-- Upload Form -->
        <div class="upload-card">
            <h1 style="margin-bottom: 0.5rem;">發問新題目</h1>
            <p style="color: var(--text-light); margin-bottom: 2rem;">系統將自動為您媒合最適合的臺大解題老師</p>

            <form id="solve-form">

                <!-- Step 1: Image -->
                <div class="form-section">
                    <h3 class="form-section-title">1. 上傳題目圖片 (必填)</h3>
                    <div class="upload-box">
                        <svg style="width: 48px; height: 48px; color: var(--text-light); margin-bottom: 1rem;"
                            fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
                            </path>
                        </svg>
                        <p>點擊上傳或將圖片拖曳至此處</p>
                        <p style="font-size: 0.875rem; color: var(--text-light);">支援 JPG, PNG, HEIC (最大 5MB)</p>
                    </div>
                </div>

                <!-- Step 2: Digitalization (Dynamic Pricing) -->
                <div class="form-section">
                    <h3 class="form-section-title">2. 數位化文字 (選填優惠)</h3>
                    <div class="dynamic-pricing-alert">
                        <strong>💡 動態點數優惠：</strong>自行輸入題目完整文字，本次發問 <strong>只需扣 1 點</strong> (純圖片需扣 2 點)。
                    </div>
                    <div class="form-group">
                        <label>題目文字內容</label>
                        <textarea id="questionText" class="form-input" rows="4" placeholder="請輸入完整的題目敘述..."
                            oninput="calculateCost()"></textarea>
                    </div>
                </div>

                <!-- Step 3: Metadata -->
                <div class="form-section" style="border-bottom: none;">
                    <h3 class="form-section-title">3. 題目分類標籤 (必填)</h3>

                    <div class="grid-2">
                        <div class="form-group">
                            <label>教育學制</label>
                            <select class="form-input" required>
                                <option value="" disabled selected>請選擇</option>
                                <option>高中 (Senior High)</option>
                                <option>高職 (Vocational)</option>
                                <option>國中 (Junior High)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>科目</label>
                            <select class="form-input" required>
                                <option value="" disabled selected>請選擇</option>
                                <option>數學</option>
                                <option>物理</option>
                                <option>化學</option>
                                <option>生物</option>
                                <option>英文</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label>題型 (Canvas 對接格式)</label>
                            <select class="form-input" required>
                                <option value="" disabled selected>請選擇</option>
                                <option>單選 (Multiple Choice)</option>
                                <option>多選 (Multi-Select)</option>
                                <option>填充 (Fill-in-the-blank)</option>
                                <option>計算/證明 (Essay/Proof)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>難易度 (自評)</label>
                            <select class="form-input" required>
                                <option value="" disabled selected>請選擇</option>
                                <option>基礎概念 (Basic)</option>
                                <option>進階應用 (Intermediate)</option>
                                <option>挑戰題 (Advanced - 優先派發醫科老師)</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>出處來源 (出版商/講義名稱/年份)</label>
                        <input type="text" class="form-input" placeholder="例如：翰林 互動式物理、112 學測、學校段考卷" required>
                    </div>
                </div>

                <!-- Submit -->
                <div class="cost-display">
                    <div>
                        <span style="color: var(--text-light); font-size: 0.875rem;">本次扣除點數</span><br>
                        <span class="cost-amount" id="costAmount" style="color: var(--error);">2 點</span>
                    </div>
                    <button type="button" class="btn-filled" onclick="alert('模擬 API: 送出資料庫並扣點！')">確認並送出題目</button>
                </div>

            </form>
        </div>
    </main>

    <script>
        function calculateCost() {
            const text = document.getElementById('questionText').value;
            const costEl = document.getElementById('costAmount');

            // Basic dynamic pricing logic: if they typed more than 10 characters, give the discount
            if (text.length > 10) {
                costEl.innerHTML = '1 點 <span style="font-size: 1rem; color: var(--primary); background: rgba(43,87,151,0.1); padding: 4px 8px; border-radius: 4px; margin-left: 8px;">已享數位化折扣</span>';
                costEl.style.color = 'var(--text)';
            } else {
                costEl.innerText = '2 點';
                costEl.style.color = 'var(--error)';
            }
        }
    </script>
</body>

</html>
