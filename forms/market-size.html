<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>市場規模調查 — 安圖教育</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

  <!-- Navigation -->
  <nav class="site-nav" aria-label="主要導覽">
    <div class="site-nav__inner">
      <a href="../tutor.html" class="site-nav__back" aria-label="返回首頁">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </a>
      <a href="../tutor.html" class="site-nav__logo">
        安圖教育
      </a>
    </div>
  </nav>

  <!-- Page header -->
  <header class="page-header">
    <div class="page-header__inner">
      <p class="page-header__eyebrow">市場研究</p>
      <h1 class="page-header__title">市場規模調查</h1>
      <p class="page-header__desc">協助我們建立台灣家教市場的底層數據估算。您的回答將用於研究目的，所有資料均匿名處理，感謝您的參與。</p>
    </div>
  </header>

  <!-- Main form -->
  <main>
    <div class="form-wrapper">
      <form action="https://formspree.io/f/mbdznqrk" method="POST">
        <input type="hidden" name="_next" value="../tutor.html">
        <input type="hidden" name="_subject" value="市場規模調查">

        <!-- Q1: Identity -->
        <div class="form-section">
          <div class="form-group">
            <fieldset>
              <legend>
                1. 您的身份是？<span class="required-star" aria-hidden="true">*</span>
              </legend>
              <div class="options-list" role="radiogroup">
                <label class="option-item">
                  <input type="radio" name="identity" value="臺大醫學系學生" required>
                  臺大醫學系學生
                </label>
                <label class="option-item">
                  <input type="radio" name="identity" value="家長">
                  家長
                </label>
                <label class="option-item">
                  <input type="radio" name="identity" value="其他教育工作者">
                  其他教育工作者
                </label>
                <label class="option-item">
                  <input type="radio" name="identity" value="其他">
                  其他
                </label>
              </div>
            </fieldset>
          </div>
        </div>

        <!-- Tutor section -->
        <div class="form-section">
          <p class="subsection-heading">【家教端】以下題目適用於有提供家教服務的受訪者</p>

          <!-- Q2: Student count -->
          <div class="form-group">
            <fieldset>
              <legend>
                2. 您目前同時輔導幾位學生？
              </legend>
              <div class="options-list" role="radiogroup">
                <label class="option-item">
                  <input type="radio" name="tutor_student_count" value="0" required>
                  0（目前未輔導）
                </label>
                <label class="option-item">
                  <input type="radio" name="tutor_student_count" value="1-2">
                  1–2 位
                </label>
                <label class="option-item">
                  <input type="radio" name="tutor_student_count" value="3-5">
                  3–5 位
                </label>
                <label class="option-item">
                  <input type="radio" name="tutor_student_count" value="5位以上">
                  5 位以上
                </label>
              </div>
            </fieldset>
          </div>

          <!-- Q3: Sessions per month -->
          <div class="form-group">
            <fieldset>
              <legend>
                3. 每月平均授課幾堂？
              </legend>
              <div class="options-list" role="radiogroup">
                <label class="option-item">
                  <input type="radio" name="tutor_sessions_per_month" value="0" required>
                  0 堂
                </label>
                <label class="option-item">
                  <input type="radio" name="tutor_sessions_per_month" value="1-4">
                  1–4 堂
                </label>
                <label class="option-item">
                  <input type="radio" name="tutor_sessions_per_month" value="5-8">
                  5–8 堂
                </label>
                <label class="option-item">
                  <input type="radio" name="tutor_sessions_per_month" value="9-12">
                  9–12 堂
                </label>
                <label class="option-item">
                  <input type="radio" name="tutor_sessions_per_month" value="12堂以上">
                  12 堂以上
                </label>
              </div>
            </fieldset>
          </div>

          <!-- Q4: Hourly rate -->
          <div class="form-group">
            <fieldset>
              <legend>
                4. 您目前每小時收費約為多少？
              </legend>
              <div class="options-list" role="radiogroup">
                <label class="option-item">
                  <input type="radio" name="tutor_hourly_rate" value="NT$800以下" required>
                  NT$800 以下
                </label>
                <label class="option-item">
                  <input type="radio" name="tutor_hourly_rate" value="NT$800-1200">
                  NT$800–1,200
                </label>
                <label class="option-item">
                  <input type="radio" name="tutor_hourly_rate" value="NT$1200-1500">
                  NT$1,200–1,500
                </label>
                <label class="option-item">
                  <input type="radio" name="tutor_hourly_rate" value="NT$1500-2000">
                  NT$1,500–2,000
                </label>
                <label class="option-item">
                  <input type="radio" name="tutor_hourly_rate" value="NT$2000以上">
                  NT$2,000 以上
                </label>
              </div>
            </fieldset>
          </div>
        </div>

        <!-- Parent section -->
        <div class="form-section">
          <p class="subsection-heading">【家長端】以下題目適用於有聘請家教的家長</p>

          <!-- Q5: Monthly spend -->
          <div class="form-group">
            <fieldset>
              <legend>
                5. 您每月在私人家教上的總花費約為多少？
              </legend>
              <div class="options-list" role="radiogroup">
                <label class="option-item">
                  <input type="radio" name="parent_monthly_spend" value="NT$5000以下">
                  NT$5,000 以下
                </label>
                <label class="option-item">
                  <input type="radio" name="parent_monthly_spend" value="NT$5000-10000">
                  NT$5,000–10,000
                </label>
                <label class="option-item">
                  <input type="radio" name="parent_monthly_spend" value="NT$10000-20000">
                  NT$10,000–20,000
                </label>
                <label class="option-item">
                  <input type="radio" name="parent_monthly_spend" value="NT$20000以上">
                  NT$20,000 以上
                </label>
              </div>
            </fieldset>
          </div>

          <!-- Q6: Fair rate -->
          <div class="form-group">
            <fieldset>
              <legend>
                6. 您認為臺大醫學系家教的合理時薪是多少？
              </legend>
              <div class="options-list" role="radiogroup">
                <label class="option-item">
                  <input type="radio" name="parent_fair_rate" value="NT$1000以下">
                  NT$1,000 以下
                </label>
                <label class="option-item">
                  <input type="radio" name="parent_fair_rate" value="NT$1000-1500">
                  NT$1,000–1,500
                </label>
                <label class="option-item">
                  <input type="radio" name="parent_fair_rate" value="NT$1500-2000">
                  NT$1,500–2,000
                </label>
                <label class="option-item">
                  <input type="radio" name="parent_fair_rate" value="NT$2000以上">
                  NT$2,000 以上
                </label>
              </div>
            </fieldset>
          </div>
        </div>

        <!-- Location & open-ended -->
        <div class="form-section">
          <!-- Q7: Region -->
          <div class="form-group">
            <fieldset>
              <legend>
                7. 您所在的地區？<span class="required-star" aria-hidden="true">*</span>
              </legend>
              <div class="options-list" role="radiogroup">
                <label class="option-item">
                  <input type="radio" name="region" value="台北市" required>
                  台北市
                </label>
                <label class="option-item">
                  <input type="radio" name="region" value="新北市">
                  新北市
                </label>
                <label class="option-item">
                  <input type="radio" name="region" value="桃園市">
                  桃園市
                </label>
                <label class="option-item">
                  <input type="radio" name="region" value="新竹市">
                  新竹市
                </label>
                <label class="option-item">
                  <input type="radio" name="region" value="台中市">
                  台中市
                </label>
                <label class="option-item">
                  <input type="radio" name="region" value="台南市">
                  台南市
                </label>
                <label class="option-item">
                  <input type="radio" name="region" value="高雄市">
                  高雄市
                </label>
                <label class="option-item">
                  <input type="radio" name="region" value="其他">
                  其他
                </label>
              </div>
            </fieldset>
          </div>

          <!-- Q8: Open-ended -->
          <div class="form-group">
            <label class="field-label" for="comments">
              8. 其他補充？
            </label>
            <textarea id="comments" name="comments" rows="4" placeholder="請自由填寫任何補充說明…"></textarea>
          </div>
        </div>

        <button type="submit" class="btn-submit">提交</button>
      </form>
    </div>
  </main>

  <script src="../js/form-handler.js"></script>

  <!-- Footer -->
  <footer class="site-footer">
    <p>安圖教育</p>
  </footer>

</body>

</html>
